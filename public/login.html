<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 - 校园食堂评价</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff4ee 0%, #fde8d8 50%, #ffd0b0 100%);
      display: flex;
      flex-direction: column;
    }

    /* 顶部系统标题 */
    .hero {
      text-align: center;
      padding: 48px 20px 24px;
      user-select: none;
    }
    .hero-icon { font-size: 48px; margin-bottom: 12px; }
    .hero-title {
      font-size: 26px;
      font-weight: 800;
      color: #e85d04;
      letter-spacing: 1px;
    }
    .hero-sub {
      font-size: 14px;
      color: #c47a4a;
      margin-top: 6px;
      font-weight: 400;
    }

    /* 主区域 */
    .main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0 20px 24px;
    }

    .cards-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 820px;
    }

    /* 第一行占满两列 */
    .cards-layout > .admin-wrap {
      grid-column: 1 / -1;
    }

    /* 卡片通用 */
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(232,93,4,.12);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
    }

    /* 管理员外层包装，让它撑满整行 */
    .admin-wrap .card {
      flex-direction: row;
      align-items: center;
      gap: 20px;
      box-shadow: 0 8px 32px rgba(99,102,241,.12);
    }
    .admin-wrap .card-icon { font-size: 36px; margin-bottom: 0; }
    .admin-wrap .admin-body { flex: 1; }
    .admin-wrap .card-title { font-size: 20px; font-weight: 700; color: #222; margin-bottom: 4px; }
    .admin-wrap .card-sub { font-size: 13px; color: #aaa; margin-bottom: 0; }
    .admin-wrap .admin-form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex: 1;
    }
    .admin-wrap .form-group { margin-bottom: 0; flex: 1; }
    .admin-wrap .form-label { font-size: 12px; }
    .admin-wrap .btn-submit-admin {
      padding: 12px 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
      height: 44px;
    }
    .admin-wrap .btn-submit-admin:hover { background: #4f46e5; }

    .card-icon { font-size: 36px; margin-bottom: 10px; }
    .card-title { font-size: 20px; font-weight: 700; color: #222; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: #aaa; margin-bottom: 24px; }

    /* 今天吃什么卡片 */
    .card.pick {
      box-shadow: 0 8px 32px rgba(232,93,4,.18);
      background: linear-gradient(135deg, #fff8f0 0%, #fff4ee 100%);
      align-items: center;
      text-align: center;
      justify-content: center;
      min-height: 280px;
    }
    .pick-title {
      font-size: 18px;
      font-weight: 700;
      color: #e85d04;
      margin-bottom: 20px;
    }
    .pick-result {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }
    .pick-dish-name {
      font-size: 32px;
      font-weight: 800;
      color: #222;
      line-height: 1.3;
    }
    .pick-price {
      font-size: 20px;
      font-weight: 700;
      color: #e85d04;
    }
    .pick-meta {
      font-size: 14px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pick-stars { color: #f59e0b; letter-spacing: 2px; }
    .pick-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pick-btn {
      padding: 11px 28px;
      background: #e85d04;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .15s;
      font-family: inherit;
    }
    .pick-btn:hover { background: #cf4e00; transform: scale(1.03); }
    .pick-btn:active { transform: scale(0.97); }
    .pick-btn-outline {
      padding: 11px 28px;
      background: #fff;
      color: #e85d04;
      border: 1.5px solid #e85d04;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .pick-btn-outline:hover { background: #fff4ee; transform: scale(1.03); }

    /* Tab（用户卡片用） */
    .tabs {
      display: flex;
      background: #f5f6fa;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #999;
      transition: all .2s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: #fff;
      color: #e85d04;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      font-weight: 700;
    }

    /* 表单 */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      background: #fafafa;
    }
    .form-input:focus {
      border-color: #e85d04;
      background: #fff;
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: #e85d04;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }
    .btn-submit:hover { background: #cf4e00; }
    .btn-submit:disabled { background: #f0b99a; cursor: not-allowed; }

    /* 管理员表单特殊样式 */
    .card.admin .form-input:focus { border-color: #6366f1; }

    /* 错误/成功提示 */
    .msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 14px;
      display: none;
    }
    .msg.error { background: #fff1f0; color: #e03e3e; display: block; }
    .msg.success { background: #f0fff4; color: #1a7f3c; display: block; }

    /* 小字提示 */
    .hint { font-size: 12px; color: #bbb; margin-top: auto; padding-top: 16px; text-align: center; }
    .hint a { color: #e85d04; text-decoration: none; }

    /* toast */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,.75);
      color: #fff;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: all .3s;
      z-index: 9999;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 底部版权 */
    .footer {
      text-align: center;
      padding: 16px 20px 24px;
      font-size: 12px;
      color: #c4a07a;
    }

    @media (max-width: 680px) {
      .cards-layout { grid-template-columns: 1fr; }
      .cards-layout > .admin-wrap { grid-column: 1; }
      .admin-wrap .card { flex-direction: column; align-items: stretch; }
      .admin-wrap .admin-form { flex-direction: column; }
      .card { padding: 28px 20px; }
      .hero { padding: 32px 20px 16px; }
      .hero-title { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="hero" onclick="location.href='index.html'">
  <div class="hero-icon">🍽️</div>
  <div class="hero-title">校园食堂窗口评价系统</div>
  <div class="hero-sub">发现美味，分享真实评价</div>
</div>

<div class="main">
  <div class="cards-layout">

    <!-- 今天吃什么卡片 -->
    <div class="card pick">
      <div class="pick-title">🎲 今天吃什么？</div>
      <div class="pick-result" id="pick-result">
        <button class="pick-btn" id="pick-btn">开始选择</button>
      </div>
    </div>

    <!-- 用户登录/注册卡片 -->
    <div class="card">
      <div class="card-icon">👤</div>
      <div class="card-title">用户中心</div>
      <div class="card-sub">登录后可发表真实评价</div>

      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">登录</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">注册</button>
      </div>

      <!-- 登录表单 -->
      <div id="form-login">
        <div id="login-msg" class="msg"></div>
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input class="form-input" id="login-username" type="text" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input class="form-input" id="login-password" type="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button class="btn-submit" id="btn-login" onclick="doLogin()">登 录</button>
      </div>

      <!-- 注册表单 -->
      <div id="form-register" style="display:none">
        <div id="register-msg" class="msg"></div>
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input class="form-input" id="reg-username" type="text" placeholder="2-50个字符" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input class="form-input" id="reg-password" type="password" placeholder="至少6位" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">确认密码</label>
          <input class="form-input" id="reg-password2" type="password" placeholder="再次输入密码" autocomplete="new-password">
        </div>
        <button class="btn-submit" id="btn-register" onclick="doRegister()">注 册</button>
      </div>

      <p class="hint">遇到问题？联系食堂管理员</p>
    </div>

    <!-- 管理员登录（占满一行） -->
    <div class="admin-wrap">
      <div class="card">
        <div class="card-icon">🛡️</div>
        <div class="admin-body">
          <div class="card-title">管理员入口</div>
          <div class="card-sub">仅限食堂管理人员使用</div>
        </div>
        <div class="admin-form">
          <div class="form-group">
            <label class="form-label">账号</label>
            <input class="form-input" id="admin-username" type="text" placeholder="请输入账号" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <input class="form-input" id="admin-password" type="password" placeholder="请输入密码" autocomplete="off">
          </div>
          <button class="btn-submit-admin" id="btn-admin" onclick="doAdminLogin()">进入后台</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="footer">© 2026 校园食堂窗口评价系统 · 仅供课程设计演示</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = '';

  // 已登录则直接跳转
  if (localStorage.getItem('token')) location.href = 'index.html';
  if (localStorage.getItem('adminToken')) location.href = 'admin.html';

  // ===== 今天吃什么 =====
  async function pickDish() {
    const btn = document.getElementById('pick-btn');
    btn.disabled = true; btn.textContent = '选餐中…';
    try {
      const res = await fetch(`${API}/api/windows/random`);
      const dish = await res.json();
      if (!dish) {
        renderPickResult(null);
        return;
      }
      renderPickResult(dish);
    } catch (e) {
      // 网络错误也显示按钮，不打断
      btn.disabled = false; btn.textContent = '再试一次';
    }
  }

  function renderPickResult(dish) {
    const el = document.getElementById('pick-result');
    if (!dish) {
      el.innerHTML = '<button class="pick-btn" onclick="pickDish()">网络异常，点击重试</button>';
      return;
    }
    const stars = dish.avg_rating
      ? '★'.repeat(Math.round(dish.avg_rating)) + '☆'.repeat(5 - Math.round(dish.avg_rating))
      : '暂无评分';
    el.innerHTML = `
      <div class="pick-dish-name">${dish.name}</div>
      <div class="pick-price">¥${Number(dish.price).toFixed(2)}</div>
      <div class="pick-meta">
        <span>📍 ${dish.window_name}</span>
        <span>·</span>
        <span class="pick-stars">${stars}</span>
        <span>${dish.avg_rating || '--'}</span>
        <span>·</span>
        <span>${dish.review_count || 0}条评价</span>
      </div>
      <div class="pick-actions">
        <button class="pick-btn" id="pick-btn">🔄 换一道</button>
        <button class="pick-btn-outline" id="btn-review-hint">✏️ 去评价</button>
      </div>
    `;
    // 去评价按钮点击提示
    document.getElementById('btn-review-hint').addEventListener('click', () => {
      toast('请先登录后再评价');
      setTimeout(() => {
        document.getElementById('login-username').focus();
      }, 500);
    });
  }

  // ===== Tab 切换 =====
  function switchTab(tab) {
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    clearMsg('login-msg');
    clearMsg('register-msg');
  }

  // ===== 用户登录 =====
  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) { showMsg('login-msg', '请填写用户名和密码', 'error'); return; }

    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = '登录中…';

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showMsg('login-msg', data.error || '登录失败', 'error'); return; }

      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.username);
      localStorage.setItem('user_id', data.user_id);
      showMsg('login-msg', '登录成功，跳转中…', 'success');
      setTimeout(() => location.href = 'index.html', 800);
    } catch (e) {
      showMsg('login-msg', '网络错误，请重试', 'error');
    } finally {
      btn.disabled = false; btn.textContent = '登 录';
    }
  }

  // ===== 用户注册 =====
  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const password2 = document.getElementById('reg-password2').value;

    if (!username || !password) { showMsg('register-msg', '请填写所有字段', 'error'); return; }
    if (username.length < 2) { showMsg('register-msg', '用户名至少2个字符', 'error'); return; }
    if (password.length < 6) { showMsg('register-msg', '密码至少6位', 'error'); return; }
    if (password !== password2) { showMsg('register-msg', '两次密码不一致', 'error'); return; }

    const btn = document.getElementById('btn-register');
    btn.disabled = true; btn.textContent = '注册中…';

    try {
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showMsg('register-msg', data.error || '注册失败', 'error'); return; }

      showMsg('register-msg', '注册成功！请登录', 'success');
      setTimeout(() => {
        switchTab('login');
        document.getElementById('login-username').value = username;
      }, 1000);
    } catch (e) {
      showMsg('register-msg', '网络错误，请重试', 'error');
    } finally {
      btn.disabled = false; btn.textContent = '注 册';
    }
  }

  // ===== 管理员登录 =====
  async function doAdminLogin() {
    const username = document.getElementById('admin-username').value.trim();
    const password = document.getElementById('admin-password').value;
    if (!username || !password) { showMsg('admin-msg', '请填写账号和密码', 'error'); return; }

    const btn = document.getElementById('btn-admin');
    btn.disabled = true; btn.textContent = '验证中…';

    try {
      const res = await fetch(`${API}/api/auth/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showMsg('admin-msg', data.error || '登录失败', 'error'); return; }

      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUsername', data.username);
      showMsg('admin-msg', '验证成功，进入后台…', 'success');
      setTimeout(() => location.href = 'admin.html', 800);
    } catch (e) {
      showMsg('admin-msg', '网络错误，请重试', 'error');
    } finally {
      btn.disabled = false; btn.textContent = '进入后台';
    }
  }

  // ===== 工具 =====
  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = `msg ${type}`;
  }
  function clearMsg(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'msg';
    el.textContent = '';
  }

  // 回车提交
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.getElementById('form-login').style.display !== 'none';
    if (active) doLogin();
    else if (document.getElementById('form-register').style.display !== 'none') doRegister();
  });

  // 事件委托：今天吃什么按钮（支持动态替换）
  document.getElementById('pick-result').addEventListener('click', e => {
    const btn = e.target.closest('.pick-btn');
    if (btn) pickDish();
  });

  // toast
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
